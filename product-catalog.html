<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>상품 도감</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --red: #E53935;
    --red-dark: #B71C1C;
    --red-light: #FFCDD2;
    --dark: #1a1a1a;
    --gray: #333;
    --gray-mid: #666;
    --gray-light: #999;
    --border: #ddd;
    --bg: #f5f5f5;
    --white: #fff;
    --yellow: #FDD835;
    --blue: #1565C0;
    --green: #2E7D32;
    --screen-bg: #9BBB4F;
    --screen-dark: #0f380f;
    --pixel: 'Press Start 2P', monospace;
  }

  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;500;700&display=swap');

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== POKEDEX SHELL ===== */
  .pokedex {
    max-width: 420px;
    margin: 0 auto;
    background: var(--red);
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  .pokedex-header {
    background: var(--red);
    padding: 12px 16px 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 3px solid var(--red-dark);
    position: relative;
  }

  .pokedex-title {
    font-family: var(--pixel);
    font-size: 9px;
    color: var(--white);
    letter-spacing: 1px;
    text-shadow: 2px 2px 0 var(--red-dark);
  }

  .light-big {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #80D8FF, #0288D1);
    border: 3px solid white;
    box-shadow: 0 0 0 2px var(--red-dark), inset 0 2px 4px rgba(0,0,0,0.2);
    flex-shrink: 0;
  }

  .lights-small {
    display: flex; gap: 5px; margin-left: auto;
  }

  .light-sm {
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.3);
  }
  .light-sm.r { background: #EF5350; }
  .light-sm.y { background: var(--yellow); }
  .light-sm.g { background: #66BB6A; }

  /* ===== SCREEN SECTION ===== */
  .screen-section {
    background: var(--red-dark);
    padding: 10px 14px;
  }

  .screen-outer {
    background: #111;
    border-radius: 8px;
    padding: 8px;
    border: 3px solid #222;
  }

  .screen-label {
    font-family: var(--pixel);
    font-size: 7px;
    color: #555;
    margin-bottom: 4px;
    text-align: center;
    letter-spacing: 2px;
  }

  .screen-inner {
    background: var(--screen-bg);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  /* ===== LIST VIEW ===== */
  .list-view {
    height: 200px;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
  }

  .list-view::-webkit-scrollbar { display: none; }

  .list-item {
    display: flex;
    align-items: center;
    padding: 6px 10px;
    gap: 8px;
    scroll-snap-align: start;
    cursor: pointer;
    border-bottom: 1px solid rgba(15,56,15,0.2);
    transition: background 0.1s;
    min-height: 40px;
  }

  .list-item:active { background: rgba(15,56,15,0.15); }

  .list-item.selected {
    background: rgba(15,56,15,0.25);
    border-left: 3px solid var(--screen-dark);
  }

  .item-num {
    font-family: var(--pixel);
    font-size: 7px;
    color: var(--screen-dark);
    opacity: 0.7;
    min-width: 36px;
  }

  .item-icon {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .item-name {
    font-family: var(--pixel);
    font-size: 8px;
    color: var(--screen-dark);
    flex: 1;
    line-height: 1.5;
  }

  .item-arrow {
    font-family: var(--pixel);
    font-size: 8px;
    color: var(--screen-dark);
    opacity: 0.5;
  }

  /* ===== BOTTOM SECTION ===== */
  .bottom-section {
    background: var(--red);
    padding: 10px 14px 6px;
    border-top: 3px solid var(--red-dark);
  }

  .dpad-area {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .dpad {
    width: 72px; height: 72px;
    position: relative;
  }

  .dpad-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 24px; height: 24px;
    background: #111;
    border-radius: 3px;
    z-index: 2;
  }

  .dpad-btn {
    position: absolute;
    background: #111;
    cursor: pointer;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    color: #555;
    font-size: 10px;
    transition: background 0.1s;
    user-select: none;
  }

  .dpad-btn:active { background: #333; }

  .dpad-up { top: 0; left: 50%; transform: translateX(-50%); width: 24px; height: 24px; }
  .dpad-down { bottom: 0; left: 50%; transform: translateX(-50%); width: 24px; height: 24px; }
  .dpad-left { left: 0; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; }
  .dpad-right { right: 0; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; }

  .search-btn-wrap {
    display: flex; align-items: center; justify-content: center;
  }

  .search-btn {
    background: #111;
    border: 3px solid #333;
    border-radius: 12px;
    width: 72px; height: 72px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 5px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 2px 0 #000;
  }

  .search-btn:active {
    background: #222;
    box-shadow: inset 0 3px 6px rgba(0,0,0,0.6);
    transform: translateY(1px);
  }

  .search-btn-icon { font-size: 24px; color: #FDD835; line-height: 1; }

  .search-btn-label {
    font-family: var(--pixel);
    font-size: 6px;
    color: #888;
    letter-spacing: 1px;
  }

  /* ===== SEARCH OVERLAY ===== */
  .search-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    padding-top: 60px;
  }

  .search-overlay.open { opacity: 1; pointer-events: all; }

  .search-panel {
    width: 100%;
    max-width: 420px;
    background: #111;
    border-radius: 12px;
    margin: 0 16px;
    overflow: hidden;
    transform: translateY(-20px);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 2px solid #333;
  }

  .search-overlay.open .search-panel { transform: translateY(0); }

  .search-input-wrap {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    gap: 8px;
    border-bottom: 1px solid #222;
  }

  .search-icon-label { font-size: 16px; flex-shrink: 0; }

  .search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--pixel);
    font-size: 10px;
    color: var(--yellow);
    caret-color: var(--yellow);
    letter-spacing: 1px;
  }

  .search-input::placeholder { color: #444; font-size: 8px; }

  .search-close-btn {
    background: #222;
    border: 1px solid #333;
    border-radius: 6px;
    color: #666;
    font-family: var(--pixel);
    font-size: 7px;
    padding: 4px 8px;
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
  }

  .search-close-btn:active { background: #333; }

  .search-results { max-height: 320px; overflow-y: auto; }
  .search-results::-webkit-scrollbar { display: none; }

  .search-result-item {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    gap: 10px;
    border-bottom: 1px solid #1a1a1a;
    cursor: pointer;
    transition: background 0.1s;
  }

  .search-result-item:active { background: #1a1a1a; }
  .search-result-item:last-child { border-bottom: none; }

  .sr-emoji { font-size: 20px; flex-shrink: 0; }
  .sr-info { flex: 1; }

  .sr-name {
    font-family: var(--pixel);
    font-size: 8px;
    color: var(--yellow);
    margin-bottom: 4px;
  }

  .sr-meta { font-size: 10px; color: #555; display: flex; gap: 6px; flex-wrap: wrap; }

  .sr-tag {
    background: #1a1a1a;
    color: #777;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 9px;
  }

  .sr-price {
    font-size: 11px;
    font-weight: 700;
    color: #E53935;
    flex-shrink: 0;
    text-align: right;
    line-height: 1.5;
  }

  .search-empty {
    padding: 28px;
    text-align: center;
    font-family: var(--pixel);
    font-size: 7px;
    color: #333;
    letter-spacing: 1px;
    line-height: 2.5;
  }

  .highlight-match {
    color: var(--yellow);
    background: rgba(253,216,53,0.12);
    border-radius: 2px;
    padding: 0 1px;
  }

  /* ===== CATALOG AREA (below pokedex) ===== */
  .catalog-area {
    background: var(--white);
    margin: 0 14px 0;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
    border: 2px solid var(--red-dark);
    border-top: none;
  }

  .catalog-hint {
    background: #111;
    font-family: var(--pixel);
    font-size: 6px;
    color: #555;
    text-align: center;
    padding: 4px;
    letter-spacing: 1px;
  }

  /* ===== SCROLL CATALOG STRIP ===== */
  .catalog-strip {
    display: flex;
    gap: 0;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    padding: 12px 8px;
    background: #f9f9f9;
    cursor: grab;
  }

  .catalog-strip:active { cursor: grabbing; }
  .catalog-strip::-webkit-scrollbar { display: none; }

  .catalog-card {
    flex: 0 0 100px;
    scroll-snap-align: start;
    background: white;
    border: 2px solid var(--border);
    border-radius: 8px;
    margin-right: 8px;
    padding: 8px 6px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    position: relative;
  }

  .catalog-card:active { transform: scale(0.97); }

  .catalog-card.active {
    border-color: var(--red);
    background: #fff5f5;
  }

  .card-num {
    font-family: var(--pixel);
    font-size: 6px;
    color: var(--gray-light);
    align-self: flex-start;
  }

  .card-icon { font-size: 32px; line-height: 1; }

  .card-name {
    font-size: 10px;
    font-weight: 700;
    color: var(--dark);
    text-align: center;
    line-height: 1.3;
  }

  .card-tag {
    font-size: 8px;
    background: var(--red-light);
    color: var(--red-dark);
    padding: 2px 5px;
    border-radius: 4px;
    font-weight: 700;
    white-space: nowrap;
  }

  /* ===== DETAIL VIEW ===== */
  .detail-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .detail-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .detail-panel {
    width: 100%;
    max-width: 420px;
    background: var(--white);
    border-radius: 16px 16px 0 0;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-height: 80vh;
    overflow-y: auto;
    overscroll-behavior: contain;
  }

  .detail-overlay.open .detail-panel {
    transform: translateY(0);
  }

  .detail-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 10px auto 0;
  }

  .detail-header {
    padding: 12px 16px 8px;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .detail-header-icon { font-size: 48px; }

  .detail-header-info { flex: 1; }

  .detail-no {
    font-family: var(--pixel);
    font-size: 8px;
    color: var(--gray-light);
    margin-bottom: 2px;
  }

  .detail-name {
    font-size: 20px;
    font-weight: 700;
    color: var(--dark);
    line-height: 1.2;
  }

  .detail-tags {
    display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px;
  }

  .tag {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
  }

  .tag-type { background: #E3F2FD; color: #1565C0; }
  .tag-status-ok { background: #E8F5E9; color: #2E7D32; }
  .tag-status-warn { background: #FFF8E1; color: #F57F17; }

  /* ===== SPEC TABLE ===== */
  .detail-body { padding: 12px 16px; }

  .section-title {
    font-family: var(--pixel);
    font-size: 8px;
    color: var(--red);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .spec-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .spec-card {
    background: #f8f8f8;
    border-radius: 8px;
    padding: 10px 12px;
    border: 1px solid var(--border);
  }

  .spec-label {
    font-size: 10px;
    color: var(--gray-mid);
    margin-bottom: 3px;
  }

  .spec-value {
    font-size: 16px;
    font-weight: 700;
    color: var(--dark);
  }

  .spec-unit {
    font-size: 11px;
    font-weight: 400;
    color: var(--gray-light);
    margin-left: 2px;
  }

  .spec-value.highlight { color: var(--red); }
  .spec-value.green { color: var(--green); }
  .spec-value.blue { color: var(--blue); }

  /* ===== FULL SPEC TABLE ===== */
  .spec-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-bottom: 16px;
  }

  .spec-table tr { border-bottom: 1px solid var(--border); }
  .spec-table tr:last-child { border-bottom: none; }

  .spec-table td {
    padding: 8px 4px;
    vertical-align: middle;
  }

  .spec-table td:first-child {
    color: var(--gray-mid);
    width: 38%;
    font-size: 12px;
  }

  .spec-table td:last-child {
    font-weight: 500;
    color: var(--dark);
    text-align: right;
  }

  /* ===== CLOSE BTN ===== */
  .detail-close {
    position: absolute;
    top: 12px;
    right: 14px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: var(--gray);
  }

  /* ===== PIXEL SCANLINES ===== */
  .screen-inner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(15,56,15,0.05) 2px,
      rgba(15,56,15,0.05) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  /* ===== STAT BAR ===== */
  .stat-bar-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  }
  .stat-bar-label { font-size: 11px; color: var(--gray-mid); min-width: 60px; }
  .stat-bar-track {
    flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .stat-bar-num { font-size: 11px; font-weight: 700; color: var(--dark); min-width: 32px; text-align: right; }

  /* desc */
  .detail-desc {
    font-size: 12px;
    color: var(--gray-mid);
    line-height: 1.6;
    background: #fafafa;
    border-left: 3px solid var(--red);
    padding: 8px 10px;
    border-radius: 0 6px 6px 0;
    margin-bottom: 16px;
  }

  .item-img { width: 28px; height: 28px; object-fit: contain; flex-shrink: 0; }
  .card-img { width: 72px; height: 72px; object-fit: contain; margin: 2px 0; }
  .detail-header-img { width: 72px; height: 72px; object-fit: contain; border-radius: 6px; background: #fafafa; flex-shrink: 0; }
  .detail-hero-img { max-height: 200px; max-width: 100%; object-fit: contain; border-radius: 8px; }
  .detail-hero-wrap { display: flex; justify-content: center; padding: 12px 0; margin-bottom: 12px; background: #fafafa; border-radius: 8px; }
</style>
</head>
<body>

<div class="pokedex">

  <!-- HEADER -->
  <div class="pokedex-header">
    <div class="light-big"></div>
    <div class="pokedex-title">PRODUCT DEX</div>
    <div class="lights-small">
      <div class="light-sm r"></div>
      <div class="light-sm y"></div>
      <div class="light-sm g"></div>
    </div>
  </div>

  <!-- SCREEN SECTION -->
  <div class="screen-section">
    <div class="screen-outer">
      <div class="screen-label">CATALOG / ITEM LIST</div>
      <div class="screen-inner">
        <div class="list-view" id="listView">
          <!-- items injected by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- D-PAD CONTROLS -->
  <div class="bottom-section">
    <div class="dpad-area">
      <div class="dpad">
        <div class="dpad-center"></div>
        <div class="dpad-btn dpad-up" id="dpadUp">▲</div>
        <div class="dpad-btn dpad-down" id="dpadDown">▼</div>
        <div class="dpad-btn dpad-left" id="dpadLeft">◀</div>
        <div class="dpad-btn dpad-right" id="dpadRight">▶</div>
      </div>
      <div class="search-btn-wrap">
        <div class="search-btn" id="searchBtn">
          <div class="search-btn-icon">🔍</div>
          <div class="search-btn-label">SEARCH</div>
        </div>
      </div>
    </div>
  </div>

  <!-- CATALOG STRIP -->
  <div class="catalog-area">
    <div class="catalog-hint">◄ DRAG TO SCROLL ►</div>
    <div class="catalog-strip" id="catalogStrip">
      <!-- cards injected by JS -->
    </div>
  </div>

</div>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-panel" id="searchPanel">
    <div class="search-input-wrap">
      <div class="search-icon-label">🔍</div>
      <input class="search-input" id="searchInput" type="text" placeholder="SEARCH PRODUCT..." autocomplete="off" />
      <button class="search-close-btn" id="searchClose">ESC</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>


<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel" id="detailPanel">
    <div class="detail-handle"></div>
    <div style="position: relative;">
      <button class="detail-close" id="detailClose">✕</button>
      <div class="detail-header" id="detailHeader"></div>
      <div class="detail-body" id="detailBody"></div>
    </div>
  </div>
</div>

<script>

// ===== EMOJI MAP =====
const EMOJI_MAP = {
  'GT': '🥛', '아침에': '🥛', '저지방': '🥛', '요구르트': '🍶',
  '불가리스': '🫙', '1000': '💪', '야채채움': '🥦',
  '과수원': '🍑', '에몽': '🍮', '써핑': '🧊', '초코': '🍫',
  'default': '🛒'
};

function getEmoji(name) {
  for (const [key, emoji] of Object.entries(EMOJI_MAP)) {
    if (name.includes(key)) return emoji;
  }
  return EMOJI_MAP.default;
}

// ===== PRODUCT DATA (Google Sheets 연동) =====
let products = [];

async function loadProducts() {
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxKYIRa5P70G3WLwQqlIPOaGxIJqW-_2WRcymMqdscTxN8nzgdRXNcngufMEawQdDOA/exec';

  showLoading(true);
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    if (!res.ok) throw new Error('fetch 실패');
    const data = await res.json();

    products = data.filter(r => r.name).map((r, i) => {
      const name = String(r.name || '');
      const cost = r.costPrice ? `₩${Number(r.costPrice).toLocaleString()}` : '-';
      const qty  = r.caseQty  ? `${r.caseQty}입` : '-';
      const sale = r.salePrice ? `₩${Number(r.salePrice).toLocaleString()}` : '-';
      const lead = r.leadTime  ? `${r.leadTime}일` : '-';
      const cat  = r.category  || '-';
      return {
        id: String(i + 1).padStart(3, '0'),
        name,
        shortName: name.length > 8 ? name.slice(0, 8) + '…' : name,
        emoji: getEmoji(name),
        image: r.image || IMAGE_CACHE[name] || null,
        category: cat,
        status: '-',
        desc: '-',
        barcode: String(r.barcode || '-'),
        costPrice: cost,
        caseQty: qty,
        salePrice: sale,
        leadTime: lead,
        tags: cat !== '-' ? [cat] : []
      };
    });

    renderList();
    renderCatalog();
  } catch (e) {
    showError('데이터를 불러오지 못했습니다.\n네트워크 연결을 확인해주세요.');
    console.error(e);
  } finally {
    showLoading(false);
  }
}

function showLoading(on) {
  document.getElementById('listView').innerHTML = on
    ? '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:var(--pixel);font-size:7px;color:var(--screen-dark);opacity:0.6;letter-spacing:1px">LOADING...</div>'
    : '';
}

function showError(msg) {
  document.getElementById('listView').innerHTML =
    `<div style="display:flex;align-items:center;justify-content:center;height:100%;padding:12px;font-family:var(--pixel);font-size:6px;color:#c00;letter-spacing:1px;text-align:center;line-height:2">${msg}</div>`;
}

let selectedIndex = 0;
let currentProduct = null;

// ===== RENDER LIST =====
function renderList() {
  const lv = document.getElementById('listView');
  lv.innerHTML = products.map((p, i) => `
    <div class="list-item ${i === selectedIndex ? 'selected' : ''}" data-idx="${i}">
      <span class="item-num">No.${p.id}</span>
      <span class="item-name">${p.shortName}</span>
      <span class="item-arrow">▶</span>
    </div>
  `).join('');

  lv.querySelectorAll('.list-item').forEach(el => {
    el.addEventListener('click', () => {
      selectedIndex = parseInt(el.dataset.idx);
      renderList();
      renderCatalog();
      openDetail(products[selectedIndex]);
    });
  });

  // scroll selected into view
  const sel = lv.querySelector('.selected');
  if (sel) sel.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ===== RENDER CATALOG STRIP =====
function renderCatalog() {
  const strip = document.getElementById('catalogStrip');
  strip.innerHTML = products.map((p, i) => `
    <div class="catalog-card ${i === selectedIndex ? 'active' : ''}" data-idx="${i}">
      <span class="card-num">#${p.id}</span>
      ${p.image ? `<img src="${p.image}" class="card-img" alt="${p.name}" />` : `<div class="card-icon">${p.emoji}</div>`}
      <div class="card-name">${p.name}</div>
      ${p.category !== '-' ? `<div class="card-tag">${p.category}</div>` : `<div class="card-tag">${p.costPrice}</div>`}
    </div>
  `).join('');

  strip.querySelectorAll('.catalog-card').forEach(el => {
    el.addEventListener('click', () => {
      selectedIndex = parseInt(el.dataset.idx);
      renderList();
      renderCatalog();
      openDetail(products[selectedIndex]);
    });
  });

  // scroll active into view
  const active = strip.querySelector('.active');
  if (active) active.scrollIntoView({ inline: 'nearest', behavior: 'smooth' });
}

// ===== DRAG SCROLL ON STRIP =====
const strip = document.getElementById('catalogStrip');
let isDragging = false, startX = 0, scrollLeft = 0;

strip.addEventListener('mousedown', e => {
  isDragging = true;
  startX = e.pageX - strip.offsetLeft;
  scrollLeft = strip.scrollLeft;
  strip.style.cursor = 'grabbing';
});
strip.addEventListener('mouseleave', () => { isDragging = false; strip.style.cursor = 'grab'; });
strip.addEventListener('mouseup', () => { isDragging = false; strip.style.cursor = 'grab'; });
strip.addEventListener('mousemove', e => {
  if (!isDragging) return;
  e.preventDefault();
  const x = e.pageX - strip.offsetLeft;
  strip.scrollLeft = scrollLeft - (x - startX) * 1.5;
});

// ===== DETAIL VIEW =====
function openDetail(product) {
  currentProduct = product;
  const header = document.getElementById('detailHeader');
  const body = document.getElementById('detailBody');

  const isEmpty = v => !v || v === '-';

  header.innerHTML = `
    <div class="detail-header-info">
      <div class="detail-no">No.${product.id}</div>
      <div class="detail-name">${product.name}</div>
      <div class="detail-tags">
        ${!isEmpty(product.category) ? `<span class="tag tag-type">${product.category}</span>` : ''}
        ${!isEmpty(product.status) ? `<span class="tag tag-status-ok">${product.status}</span>` : ''}
        ${product.tags.map(t => `<span class="tag" style="background:#f3f3f3;color:#555">${t}</span>`).join('')}
      </div>
    </div>
  `;

  const val = v => isEmpty(v) ? '<span style="color:#ccc">미입력</span>' : v;

  body.innerHTML = `
    ${product.image ? `<div class="detail-hero-wrap"><img src="${product.image}" class="detail-hero-img" alt="${product.name}" /></div>` : ''}
    <div class="section-title">KEY INFO</div>
    <div class="spec-grid">
      <div class="spec-card">
        <div class="spec-label">공가 (VAT-)</div>
        <div class="spec-value highlight" style="font-size:13px">${val(product.costPrice)}</div>
      </div>
      <div class="spec-card">
        <div class="spec-label">권장 판매가</div>
        <div class="spec-value green" style="font-size:13px">${val(product.salePrice)}</div>
      </div>
      <div class="spec-card">
        <div class="spec-label">리드타임</div>
        <div class="spec-value blue">${val(product.leadTime)}</div>
      </div>
      <div class="spec-card">
        <div class="spec-label">입수량</div>
        <div class="spec-value" style="font-size:13px">${val(product.caseQty)}</div>
      </div>
      <div class="spec-card">
        <div class="spec-label">상품 분류</div>
        <div class="spec-value" style="font-size:13px">${val(product.category)}</div>
      </div>
    </div>

    <div class="section-title">PRODUCT CODE</div>
    <div style="background:#f8f8f8;border:1px solid #eee;border-radius:8px;padding:12px 14px;margin-bottom:16px;">
      <span style="font-family:monospace;font-size:15px;font-weight:700;color:#1a1a1a;letter-spacing:2px">${isEmpty(product.barcode) ? '<span style="color:#ccc;font-size:13px">미입력</span>' : product.barcode}</span>
    </div>

    ${!isEmpty(product.desc) ? `
    <div class="section-title">DESCRIPTION</div>
    <div class="detail-desc">${product.desc}</div>
    ` : ''}
  `;

  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
}

document.getElementById('detailClose').addEventListener('click', closeDetail);
document.getElementById('detailOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('detailOverlay')) closeDetail();
});

// ===== D-PAD =====
document.getElementById('dpadUp').addEventListener('click', () => {
  if (selectedIndex > 0) { selectedIndex--; renderList(); renderCatalog(); }
});
document.getElementById('dpadDown').addEventListener('click', () => {
  if (selectedIndex < products.length - 1) { selectedIndex++; renderList(); renderCatalog(); }
});
document.getElementById('dpadLeft').addEventListener('click', () => {
  if (selectedIndex > 0) { selectedIndex--; renderList(); renderCatalog(); }
});
document.getElementById('dpadRight').addEventListener('click', () => {
  if (selectedIndex < products.length - 1) { selectedIndex++; renderList(); renderCatalog(); }
});

// ===== SEARCH =====
function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<span class="highlight-match">$1</span>');
}

function renderSearchResults(query) {
  const container = document.getElementById('searchResults');
  const q = query.trim().toLowerCase();

  if (!q) {
    container.innerHTML = '<div class="search-empty">상품명, 카테고리,<br>태그로 검색하세요</div>';
    return;
  }

  const results = products.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.shortName.toLowerCase().includes(q) ||
    p.category.toLowerCase().includes(q) ||
    p.tags.some(t => t.toLowerCase().includes(q)) ||
    (p.barcode && p.barcode.toLowerCase().includes(q)) ||
    (p.desc && p.desc.toLowerCase().includes(q))
  );

  if (!results.length) {
    container.innerHTML = `<div class="search-empty">NO RESULTS<br>for "${query}"</div>`;
    return;
  }

  container.innerHTML = results.map(p => `
    <div class="search-result-item" data-id="${p.id}">
      <div class="sr-emoji">${p.emoji}</div>
      <div class="sr-info">
        <div class="sr-name">${highlight(p.name, query)}</div>
        <div class="sr-meta">
          ${p.category !== '-' ? `<span class="sr-tag">${highlight(p.category, query)}</span>` : ''}
          ${p.tags.map(t => `<span class="sr-tag">${highlight(t, query)}</span>`).join('')}
        </div>
      </div>
      <div class="sr-price">
        ${p.costPrice !== '-' ? p.costPrice : '<span style="color:#444;font-size:10px">공가 미입력</span>'}<br>
        <span style="color:#2E7D32;font-size:10px">${p.leadTime !== '-' ? p.leadTime : '-'}</span>
      </div>
    </div>
  `).join('');

  container.querySelectorAll('.search-result-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = products.findIndex(p => p.id === el.dataset.id);
      if (idx >= 0) {
        selectedIndex = idx;
        renderList();
        renderCatalog();
        closeSearch();
        openDetail(products[idx]);
      }
    });
  });
}

function openSearch() {
  const overlay = document.getElementById('searchOverlay');
  const input = document.getElementById('searchInput');
  overlay.classList.add('open');
  renderSearchResults('');
  setTimeout(() => input.focus(), 200);
}

function closeSearch() {
  document.getElementById('searchOverlay').classList.remove('open');
  document.getElementById('searchInput').value = '';
}

document.getElementById('searchBtn').addEventListener('click', openSearch);
document.getElementById('searchClose').addEventListener('click', closeSearch);

document.getElementById('searchOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('searchOverlay')) closeSearch();
});

document.getElementById('searchInput').addEventListener('input', e => {
  renderSearchResults(e.target.value);
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSearch();
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
});

// ===== INIT =====
loadProducts();
</script>
</body>
</html>
